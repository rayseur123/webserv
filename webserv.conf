server{
	listen	127.0.0.1:4242;

	error_page 404 /data/www/error404.html;

	client_max_body_size 50m;

	location / {
		root /data/www;
		allow_methods: POST GET DELETE;
		autoindex on;
	}

	location /test {
		redirect https://google.fr;
		autoindex on;
	}
}

server{
	listen	0.0.0.0:4343;

	error_page 404 /data/www/error404.html;

	client_max_body_size 50m;

	location / {
		root /data/www;
		allow_methods POST GET DELETE;
		autoindex off;
		index index.html;
		upload_store /var/upload/;
		cgi_pass /cgi/php/php-fpm83
	}

	location /test {
		redirect https://google.fr;
	}
}

server{
	listen	0.0.0.0:4444;

	error_page 405 /data/www/error405.html;

	client_max_body_size 50m;

	location / {
		autoindex on;
		root /data/www;
		allow_methods: POST GET DELETE;
		index index.html;
		upload_store /var/upload/
		cgi_pass /cgi/python/python3
	}

}
